<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✨ Our Fairytale ✨</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Georgia,serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#4b1b6b,#170021 65%,#090012);
color:#fff;
}
body:before{
content:"";
position:fixed;inset:0;
background:
radial-gradient(circle,rgba(255,255,255,.15) 1px,transparent 2px);
background-size:60px 60px;
opacity:.35;
animation:twinkle 8s linear infinite;
}
@keyframes twinkle{
0%{transform:translateY(0)}
100%{transform:translateY(-60px)}
}
.card{
position:relative;
width:min(92vw,430px);
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.18);
border-radius:28px;
padding:22px;
box-shadow:0 0 45px rgba(255,105,180,.35);
z-index:2;
animation:fade 1s;
}
@keyframes fade{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
h1,h2{margin:.3rem 0;text-align:center}
.slideshow{height:240px;border-radius:20px;overflow:hidden;box-shadow:0 0 20px rgba(255,255,255,.15)}
.slideshow img{width:100%;height:100%;object-fit:cover;transition:.6s}
#msg{min-height:135px;text-align:center;line-height:1.55;font-size:15px;padding:10px}
.controls{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.controls button,.choice button{
border:none;border-radius:999px;padding:10px 18px;cursor:pointer;font-weight:bold}
.controls button{background:#ffffff22;color:#fff}
.choice{display:flex;justify-content:center;gap:16px}
.yes{background:#ff4da6;color:#fff}
.no{background:#7a7a7a;color:#fff}
#page{font-size:14px}
.heart{
position:absolute;
font-size:24px;
animation:float 4s linear forwards}
@keyframes float{
from{transform:translateY(0) scale(.8);opacity:1}
to{transform:translateY(-420px) scale(1.4);opacity:0}
}
</style>
</head>
<body>
<div class="card" id="card">
<h1>✨ A Little Fairytale ✨</h1>
<div class="slideshow" id="touchArea">
<img id="slide" src="img1.jpg">
</div>
<div class="controls">
<button onclick="prevSlide()">◀</button>
<div id="page"></div>
<button onclick="nextSlide()">▶</button>
</div>
<div id="msg"></div>
<h2>Will you accept our love? ❤️</h2>
<div class="choice" id="btns">
<button class="yes" id="yesBtn" onclick="acceptLove()">Yes 💖</button>
<button class="no" id="noBtn" onclick="swapButtons()">No 😅</button>
</div>
</div>
<script>
const slides=[
["img1.jpg","🌸 Hi Athai, I know your daughter's character. She has a kind and beautiful heart."],
["img2.jpg","🤍 I know how to understand and handle her with patience and respect."],
["img3.jpg","🍳 She may not know cooking much, but I can cook too, so we'll happily manage together."],
["img1.jpg","🏡 Home responsibilities will never belong to one person—we will share them."],
["img2.jpg","😊 I know how to make her smile, and I want to protect that smile."],
["img3.jpg","🙏 You have raised a wonderful and mature daughter. Thank you for that."],
["img1.jpg","✨ Maybe our story was written by the Universe. Please say YES and let this fairytale continue."]
];
let i=0;
function render(){
slide.src=slides[i][0];
msg.innerHTML=slides[i][1];
page.textContent=(i+1)+" / "+slides.length;
}
function nextSlide(){i=(i+1)%slides.length;render();}
function prevSlide(){i=(i-1+slides.length)%slides.length;render();}
render();
setInterval(nextSlide,4500);

let sx=0;
touchArea.addEventListener("touchstart",e=>sx=e.touches[0].clientX);
touchArea.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-sx;
if(dx>40)prevSlide();
if(dx<-40)nextSlide();
});

let swapped=false;
function swapButtons(){
alert("🥹 Please don't say No. Maybe this is the Universe's plan. A pair like us is rare. Think once more and press YES to read the Universe's message. ✨❤️");
const c=document.getElementById("btns");
if(!swapped){c.insertBefore(noBtn,yesBtn);swapped=true;}
else{c.insertBefore(yesBtn,noBtn);swapped=false;}
}
function acceptLove(){
card.innerHTML=`<h1>✨ Message from the Universe ✨</h1>
<h2>🌙 Universe Order For Us ❤️</h2>
<div style="line-height:1.7;text-align:left;padding:8px 12px">
❤️ Always choose each other.<br>
🤝 Share responsibilities.<br>
🌸 Speak with kindness.<br>
😊 Protect each other's smile.<br>
🏡 Respect both families.<br>
💖 Never let ego become bigger than love.<br>
✨ Keep trusting, growing and dreaming together.<br><br>
<b>The Universe says:</b><br>
"Write the rest of this fairytale hand in hand... happily ever after." 💫
</div>`;
for(let k=0;k<45;k++){
let h=document.createElement("div");
h.className="heart";
h.textContent="💖";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
document.body.appendChild(h);
}
}
</script>
</body>
</html>
