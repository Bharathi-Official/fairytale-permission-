<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Uncle & Aunty 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #2b0a3d, #0d001a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* card */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255,105,180,0.4);
}

h1 { font-size: 22px; }
p { font-size: 14px; }

/* slideshow */
.slideshow {
  width: 100%;
  height: 200px;
  margin: 15px 0;
  border-radius: 15px;
  overflow: hidden;
}
.slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* buttons container */
.btns {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
}

/* buttons */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.4s;
}

.yes { background: #ff4da6; color: white; }
.no { background: #777; color: white; }

button:hover { transform: scale(1.1); }

/* hearts */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: floatUp 3s linear forwards;
}
@keyframes floatUp {
  from { transform: translateY(0); opacity:1; }
  to { transform: translateY(-300px); opacity:0; }
}

/* stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: float 6s linear infinite;
}
@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">

  <h1>Hi Uncle & Aunty 🙏😊</h1>

  <p>
    Naanum unga ponnum love panrom 💞  
    Avala sandhosama paathupen 💖✨
  </p>

  <div class="slideshow">
    <img id="slide" src="img1.jpg">
  </div>

  <h2 style="font-size:18px;">Will you accept our love? ❤️🥺</h2>

  <div class="btns" id="btns">
    <button class="yes" id="yesBtn" onclick="acceptLove()">Yes 💖</button>
    <button class="no" id="noBtn" onclick="swapButtons()">No 😅</button>
  </div>

</div>

<script>

/* slideshow */
let imgs = ["img1.jpg","img2.jpg","img3.jpg"];
let index = 0;
setInterval(()=>{
  index = (index+1)%imgs.length;
  document.getElementById("slide").src = imgs[index];
},2500);

/* swap buttons */
let swapped = false;
function swapButtons(){
  let container = document.getElementById("btns");
  let yes = document.getElementById("yesBtn");
  let no = document.getElementById("noBtn");

  if(!swapped){
    container.insertBefore(no, yes); // swap position
    swapped = true;
  } else {
    container.insertBefore(yes, no); // swap back
    swapped = false;
  }
}

/* yes click */
function acceptLove(){
  document.getElementById("card").innerHTML = `
    <h1>Thank you Uncle & Aunty 💖🙏</h1>
    <p>Neenga romba sandhoshama feel panuvinga 😊✨</p>
    <p>Tea treat from me ☕😄🎉</p>
  `;

  for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerText="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.bottom="0";
    document.body.appendChild(heart);
  }
}

/* stars */
for(let i=0;i<60;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(Math.random()*5+4)+"s";
  document.body.appendChild(star);
}

</script>

</body>
</html>-
